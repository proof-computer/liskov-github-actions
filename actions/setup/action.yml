name: "Liskov CI setup"
description: "Set up Node + pnpm and install dependencies for a Liskov repo. (Caller does the checkout.)"
inputs:
  node-version:
    description: "Node version."
    required: false
    default: "24"
  pnpm-version:
    description: "pnpm version (set explicitly for monorepos where the repo root lacks a packageManager field)."
    required: false
    default: "10"
  working-directory:
    description: "Directory containing package.json / pnpm-lock.yaml."
    required: false
    default: "."
runs:
  using: "composite"
  steps:
    - uses: pnpm/action-setup@v4
      with:
        version: ${{ inputs.pnpm-version }}
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: ${{ inputs.working-directory }}/pnpm-lock.yaml
    - shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm install --frozen-lockfile
