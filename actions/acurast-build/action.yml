name: "Acurast app build"
description: "typecheck + test + build (+ optional smoke) for an Acurast app. Assumes setup has run."
inputs:
  working-directory:
    description: "App directory."
    required: false
    default: "."
  smoke:
    description: "Run `pnpm smoke:bundle` after build."
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        pnpm typecheck
        pnpm test
        pnpm build
        if [ "${{ inputs.smoke }}" = "true" ]; then pnpm smoke:bundle; fi
